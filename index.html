<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠記錄</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
</head>
<body>

<header class="app-header">
    <div class="header-inner">
        <div class="app-title">🌙 睡眠記錄</div>
        <a href="monthly.html" class="nav-link">月報 →</a>
    </div>
</header>

<main class="container">

    <!-- 日期導航 -->
    <div class="date-nav">
        <button class="btn-nav" id="prev-day" title="前一天">‹</button>
        <div class="date-nav-center">
            <div id="current-date">—</div>
            <button class="btn-today" id="today-btn" style="display:none">回到今天</button>
        </div>
        <button class="btn-nav" id="next-day" title="後一天" disabled>›</button>
    </div>

    <!-- 今日總時長 -->
    <div class="total-card">
        <span class="total-label">今日總睡眠</span>
        <span id="total-duration">—</span>
    </div>

    <!-- 記錄列表 -->
    <div class="records-list" id="records-container">
        <div class="state-msg">載入中⋯</div>
    </div>

    <!-- 輸入表單（直接嵌入首頁） -->
    <div class="form-section" id="form-section">
        <div class="form-section-header">
            <span id="form-title" class="form-title-text">新增記錄</span>
            <button type="button" class="btn-cancel-edit" id="cancel-edit" style="display:none">✕ 取消編輯</button>
        </div>

        <form id="record-form" novalidate>
            <div class="form-row-2">
                <div class="form-group">
                    <label class="form-label" for="session-number">第幾次睡眠</label>
                    <select class="form-control" id="session-number" required>
                        <option value="1">第 1 次</option>
                        <option value="2">第 2 次</option>
                        <option value="3">第 3 次</option>
                        <option value="4">第 4 次</option>
                    </select>
                </div>
                <div class="form-group logical-date-group">
                    <label class="form-label">邏輯日</label>
                    <div id="logical-date-info" class="logical-date-display">—</div>
                </div>
            </div>

            <div class="form-row-2">
                <div class="form-group">
                    <label class="form-label" for="sleep-start">睡著時間</label>
                    <input class="form-control" type="datetime-local" id="sleep-start" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="sleep-end">起床時間 <span class="optional">（可留空）</span></label>
                    <input class="form-control" type="datetime-local" id="sleep-end">
                </div>
            </div>

            <div class="form-row-2">
                <div class="form-group">
                    <label class="form-label" for="interruption-minutes">
                        零碎起床時長 <span class="optional">（分鐘）</span>
                    </label>
                    <input class="form-control" type="number" id="interruption-minutes"
                           min="0" step="1" value="0" placeholder="0">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <div id="duration-preview" class="duration-preview" style="padding-bottom:0.65rem;"></div>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn btn-primary" id="submit-btn">儲存記錄</button>
            </div>
        </form>
    </div>

</main>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/main.js"></script>
</body>
</html>
